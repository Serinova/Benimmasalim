services:
  postgres:
    image: postgres:15-alpine
    container_name: benimmasalim-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: benimmasalim
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: benimmasalim-redis
    ports:
      - "6380:6379"  # Host 6380 (diğer projeler 6379 kullanıyor)
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: benimmasalim-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/benimmasalim
      - REDIS_URL=redis://redis:6379/0
      - APP_ENV=development
      - DEBUG=true
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../backend/app:/app/app:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      target: development
    container_name: benimmasalim-frontend
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
      - NEXTAUTH_URL=http://localhost:3001
    env_file:
      - ../.env
    depends_on:
      - backend
    volumes:
      - ../frontend/src:/app/src:ro
      - ../frontend/public:/app/public:ro
    command: npm run dev

  # Celery worker (opsiyonel - Cloud Tasks kullanılacak)
  # worker:
  #   build:
  #     context: ../backend
  #     dockerfile: Dockerfile
  #   container_name: benimmasalim-worker
  #   environment:
  #     - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/benimmasalim
  #     - REDIS_URL=redis://redis:6379/0
  #   env_file:
  #     - ../.env
  #   depends_on:
  #     - postgres
  #     - redis
  #   command: celery -A app.tasks worker --loglevel=info

  # pgAdmin (development only)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: benimmasalim-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@benimmasalim.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    profiles:
      - tools

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: benimmasalim-network
