# Proje kökünden çalıştırmak için: docker compose up -d --build
# Servisler: postgres, redis, backend (8000), frontend (3001)
# GÜVENLİK: .env dosyasında POSTGRES_PASSWORD, PGADMIN_PASSWORD tanımlayın!
services:
  postgres:
    image: postgres:15-alpine
    container_name: benimmasalim-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-benimmasalim}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: benimmasalim-redis
    command: redis-server
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: benimmasalim-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-benimmasalim}
      - REDIS_URL=redis://redis:6379/0
      - APP_ENV=${APP_ENV:-development}
      - DEBUG=${DEBUG:-false}
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app:ro
      - ./backend/alembic:/app/alembic:ro
      - media_data:/app/media
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    read_only: true
    tmpfs:
      - /tmp

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: benimmasalim-worker
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-benimmasalim}
      - REDIS_URL=redis://redis:6379/0
      - APP_ENV=${APP_ENV:-development}
      - DEBUG=${DEBUG:-false}
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app:ro
    command: arq app.workers.image_worker.WorkerSettings
    healthcheck:
      test: ["CMD", "python", "-c", "import os,redis; from urllib.parse import urlparse; u=urlparse(os.environ.get('REDIS_URL','redis://redis:6379/0')); r=redis.Redis(host=u.hostname or 'redis', port=u.port or 6379, password=u.password or None); r.ping()"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: benimmasalim-frontend
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
      - NEXTAUTH_URL=http://localhost:3001
    env_file:
      - .env
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src:ro
      - ./frontend/public:/app/public:ro
    command: npm run dev

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: benimmasalim-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@benimmasalim.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "127.0.0.1:5050:80"
    depends_on:
      - postgres
    profiles:
      - tools

volumes:
  postgres_data:
  redis_data:
  media_data:
